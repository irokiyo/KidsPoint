
services:
  nginx:
    image: nginx:1.21.1
    ports:
      - "80:80"
    ##共有するもの、var/www/Laravelのコードをコンテナの中で見えるようにしている
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./src:/var/www/
    ##serviceの名前と一致していること
    depends_on:
      - php

  php:
    ## phpコンテナは Dockerfile から作るので build を使う
    ## 既製品のイメージを使う場合は image を使う
    build: ./docker/php
    volumes:
      - ./src:/var/www/

  mysql:
    image: mysql:8.0.26
    platform: linux/amd64
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: laravel_db
      MYSQL_USER: laravel_user
      MYSQL_PASSWORD: laravel_pass
      ##接続エラーを起きにくくしている
    command:
      mysqld --default-authentication-plugin=mysql_native_password
    volumes:
      - ./docker/mysql/data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    environment:
      - PMA_ARBITRARY=1
      - PMA_HOST=mysql
      - PMA_USER=laravel_user
      - PMA_PASSWORD=laravel_pass
    depends_on:
      - mysql
    ports:
      - 8080:80
      
  mailhog:
    image: mailhog/mailhog
    ports:
    ##1025 → メール送信用 8025 → ブラウザで確認
    ##"自分のPCの8025 : コンテナの8025"
      - "1025:1025"
      - "8025:8025"

